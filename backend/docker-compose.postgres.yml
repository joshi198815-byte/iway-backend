version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: iway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - iway_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iway"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  iway_postgres_data:
